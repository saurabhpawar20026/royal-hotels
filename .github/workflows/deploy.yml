name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Build under the repo subpath (/royal-hotels/). Optional UPI ID from a repo variable.
      - run: npx vite build --base=/royal-hotels/
        env:
          VITE_PAYEE_VPA: ${{ vars.VITE_PAYEE_VPA }}
          VITE_PAYEE_NAME: ${{ vars.VITE_PAYEE_NAME }}
      # SPA fallback so deep links (e.g. /rooms) work on refresh
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
